<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: -apple-system, sans-serif;
    padding: 16px;
    font-size: 13px;
  }
  .status { 
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: #16213e;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #e74c3c;
    transition: background 0.3s;
  }
  .dot.connected { background: #2ecc71; }
  .log {
    background: #0f3460;
    border-radius: 6px;
    padding: 10px;
    max-height: 300px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.5;
  }
  .log p { margin: 2px 0; opacity: 0.8; }
  .log p.cmd { color: #64b5f6; opacity: 1; }
  .log p.done { color: #81c784; }
  .log p.err { color: #e57373; }
</style>
</head>
<body>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Disconnected</span>
  </div>
  <div class="log" id="log"></div>
  <script>
    var dot = document.getElementById('dot');
    var statusText = document.getElementById('statusText');
    var logEl = document.getElementById('log');
    var healthInterval = null;

    function addLog(msg, cls) {
      var p = document.createElement('p');
      p.className = cls || '';
      p.textContent = '> ' + msg;
      logEl.appendChild(p);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function sendToPlugin(msg) {
      parent.postMessage({ pluginMessage: msg }, '*');
    }

    function get(url, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = 5000;
      xhr.onload = function() {
        var data = null;
        try { data = JSON.parse(xhr.responseText); } catch(e) {}
        callback(null, data);
      };
      xhr.onerror = function(e) {
        callback(e, null);
      };
      xhr.send();
    }

    function post(url, body, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.timeout = 5000;
      xhr.onload = function() {
        var data = null;
        try { data = JSON.parse(xhr.responseText); } catch(e) {}
        callback(null, data);
      };
      xhr.onerror = function(e) {
        callback(e, null);
      };
      xhr.send(body);
    }

    function checkHealth() {
      get('http://localhost:9199/health?t=' + Date.now(), function(err, data) {
        if (err) {
          sendToPlugin({ type: 'http-error', url: 'http://localhost:9199/health' });
          return;
        }
        sendToPlugin({ type: 'http-response', url: 'http://localhost:9199/health', status: 200, responseData: data });
        // Start continuous poll for commands once healthy
        if (!window._pollStarted) {
          window._pollStarted = true;
          setInterval(function() {
            get('http://localhost:9199/next-command?t=' + Date.now(), function(err, data) {
              if (err) return;
              sendToPlugin({ type: 'http-response', url: 'http://localhost:9199/next-command', status: 200, responseData: data });
            });
          }, 1500);
        }
      });
    }

    // Handle messages from plugin code
    window.addEventListener('message', function(event) {
      var msg = event.data.pluginMessage || event.data;
      if (!msg) return;

      if (msg.type === 'status') {
        dot.className = 'dot' + (msg.connected ? ' connected' : '');
        statusText.textContent = msg.connected ? 'Connected to Craw' : 'Disconnected';
        return;
      }
      if (msg.type === 'log') {
        addLog(msg.text, msg.level);
        return;
      }
      if (msg.type === 'http-get') {
        get(msg.url, function(err, data) {
          if (err) {
            sendToPlugin({ type: 'http-error', url: msg.url, error: 'Network error' });
          } else {
            sendToPlugin({ type: 'http-response', url: msg.url, status: 200, responseData: data });
          }
        });
        return;
      }
      if (msg.type === 'http-post') {
        post(msg.url, msg.body, function(err, data) {
          if (err) {
            sendToPlugin({ type: 'http-error', url: msg.url, error: 'Network error' });
          } else {
            sendToPlugin({ type: 'http-response', url: msg.url, status: 200, responseData: data });
          }
        });
        return;
      }
    });

    // Initial ready signal
    sendToPlugin({ type: 'ready' });
    addLog('Craw Figma Connector ready');

    // Start health checks
    setTimeout(checkHealth, 300);
  </script>
</body>
</html>
