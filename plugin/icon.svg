<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F18"/>
      <stop offset="100%" stop-color="#10151E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#247DFF"/>
      <stop offset="100%" stop-color="#55A4FF"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="none" stroke="#1A2030" stroke-width="2"/>

  <!-- Crab claw shape -->
  <g transform="translate(80, 100)" filter="url(#neon-glow)">
    <!-- Main arm -->
    <!-- Upper pincer (curved) -->
    <path d="M 120 260 
             C 120 180, 140 100, 200 60
             C 230 40, 270 30, 300 45
             C 330 60, 350 90, 340 120
             C 330 150, 300 160, 280 140"
          fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round"/>

    <!-- Lower pincer -->
    <path d="M 120 260
             C 130 220, 160 160, 220 130
             C 260 110, 300 110, 330 130
             C 360 150, 370 180, 350 210
             C 330 240, 300 240, 280 220"
          fill="none" stroke="url(#glow)" stroke-width="16" stroke-linecap="round"/>

    <!-- Arm connecting body -->
    <path d="M 120 260 C 100 280, 80 300, 70 320"
          fill="none" stroke="url(#glow)" stroke-width="20" stroke-linecap="round"/>

    <!-- Inner sharp teeth on pincer -->
    <path d="M 280 140 L 260 120 M 275 148 L 258 132"
          fill="none" stroke="#247DFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M 280 220 L 260 200 M 275 212 L 255 195"
          fill="none" stroke="#247DFF" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Figma Logo (stylized) at bottom right -->
  <g transform="translate(340, 370)">
    <!-- Filled region -->
    <rect x="0" y="0" width="40" height="60" rx="10" fill="#247DFF" opacity="0.6"/>
    <!-- Hollow region -->
    <rect x="0" y="0" width="40" height="30" rx="10" fill="none" stroke="#247DFF" stroke-width="3"/>
    <!-- Small circle -->
    <circle cx="20" cy="45" r="10" fill="none" stroke="#247DFF" stroke-width="3"/>
  </g>

  <!-- Circuit-like decorative dots -->
  <g fill="#247DFF" opacity="0.3">
    <circle cx="50" cy="50" r="3"/>
    <circle cx="462" cy="50" r="3"/>
    <circle cx="50" cy="462" r="3"/>
    <circle cx="462" cy="462" r="3"/>
  </g>

  <!-- Connector dots along arm -->
  <g fill="#55A4FF" opacity="0.5">
    <circle cx="260" cy="60" r="4"/>
    <circle cx="320" cy="80" r="3"/>
    <circle cx="190" cy="100" r="3"/>
    <circle cx="140" cy="180" r="3"/>
  </g>
</svg>
